name: Build Kingfox Biller Installer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # 📦 Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 🐦 Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Install Dependencies
        run: flutter pub get

      # 🏗 Build Flutter app
      - name: Build Windows App
        run: flutter build windows --release

      # 📁 Prepare build output
      - name: Prepare Build Output
        run: |
          mkdir build_output
          xcopy build\windows\x64\runner\Release build_output /E /I

      # 🏗 Install Inno Setup
      - name: Install Inno Setup
        run: choco install innosetup -y

      # 📝 Create installer script (NO ICONS)
      - name: Create installer script
        run: |
          @"
          [Setup]
          AppName=Kingfox Biller
          AppVersion=1.0.0
          AppPublisher=Kingfox Clothing
          AppComments=Developed by Palqar Private Limited
          DefaultDirName={pf}\Kingfox Biller
          DefaultGroupName=Kingfox Biller
          OutputDir=installer_output
          OutputBaseFilename=KingfoxBillerSetup
          Compression=lzma
          SolidCompression=yes

          [Files]
          Source: "build_output\*"; DestDir: "{app}"; Flags: recursesubdirs

          [Icons]
          Name: "{group}\Kingfox Biller"; Filename: "{app}\runner.exe"

          [Run]
          Filename: "{app}\runner.exe"; Description: "Launch Kingfox Biller"; Flags: nowait postinstall skipifsilent
          "@ | Out-File installer.iss -Encoding ascii

      # 🔐 Generate self-signed certificate
      - name: Generate certificate
        run: |
          $cert = New-SelfSignedCertificate `
            -Type CodeSigning `
            -Subject "CN=Kingfox Clothing, O=Palqar Private Limited" `
            -KeyUsage DigitalSignature `
            -CertStoreLocation "Cert:\CurrentUser\My"

          $pwd = ConvertTo-SecureString -String "password123" -Force -AsPlainText

          Export-PfxCertificate `
            -Cert $cert `
            -FilePath cert.pfx `
            -Password $pwd

      # 📦 Build installer
      - name: Build Installer
        run: iscc installer.iss

      # 🧰 Install Windows SDK (for signtool)
      - name: Install Windows SDK
        run: choco install windows-sdk-10-version-2004-all -y

      # 🔏 Sign installer
      - name: Sign Installer
        run: |
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" -Recurse | Select-Object -First 1

          if (-not $signtool) {
            Write-Error "signtool not found!"
            exit 1
          }

          & $signtool.FullName sign `
            /f cert.pfx `
            /p password123 `
            /fd sha256 `
            /tr http://timestamp.digicert.com `
            installer_output\KingfoxBillerSetup.exe

      # 📤 Upload installer
      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: kingfox-biller-installer
          path: installer_output\KingfoxBillerSetup.exe